<div class="row">
    <div class="col-md-8 offset-md-2">
        <nb-card>
            <nb-card-header>Product Detail</nb-card-header>
            <nb-card-body>
                <form>
                    <div class="form-group row">
                        <label for="inputTitle1" class="label col-sm-3 col-form-label">Title</label>
                        <div class="col-sm-9">
                            <input type="text" nbInput fullWidth id="inputTitle1" placeholder="Title">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="inputSubtitle2" class="label col-sm-3 col-form-label">Subtitle</label>
                        <div class="col-sm-9">
                            <input type="text" nbInput fullWidth id="inputSubtitle2" placeholder="Subtitle">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="inputPrice3" class="label col-sm-3 col-form-label">Price</label>
                        <div class="col-sm-9">
                            <input type="number" nbInput fullWidth id="inputPrice3" placeholder="Price">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="inputTextArea4" class=" label col-sm-3 col-form-label">Description</label>
                        <div class="col-sm-9">
                            <textarea nbInput fullWidth it="inputTextArea4" rows="10" placeholder="Description"></textarea>
                        </div>
                    </div>
                    <div class="form-group row">
                        <div class="offset-sm-3 col-sm-9 buttons-row">
                            <button type="button" nbButton status="secondary">Back</button>
                            <button type="submit" nbButton status="primary">Save</button>
                        </div>
                    </div>
                </form>
            </nb-card-body>
        </nb-card>
    </div>
</div>
